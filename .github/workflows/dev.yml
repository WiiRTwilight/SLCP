name: Build product

on:
  push:
    branches:
      ["dev"]
  pull_request:
    branches:
      ["dev"]

jobs:
  build_product:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4 # v4.0.0

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Upload product
        uses: actions/upload-artifact@v4
        with:
          name: prod ${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 1